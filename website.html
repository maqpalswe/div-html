<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapsirma</title>
    <style>
        .box{
            width: 150px;
            height: 190px;
            border: 1px solid black;
            display: inline-block;
        }

       .profil{
        width: 30px;
        height: 30px;
        border-radius: 50%;
        vertical-align: middle;
       }
       span{
        color: gray;
       }

       button{
        border: none;
        border-radius: 4px;
        color: white;
        background-color: blue;
        padding: 5px 5px 5px 5px;;
       }
        
       .box-2{
         width: 150px;
         height: 190px;
        display: inline-block;
        vertical-align: top;
        border: 1px solid black;
       }

       
       .box-3{
         width: 150px;
         height: 190px;
        display: inline-block;
        vertical-align: top;
        border: 1px solid black;
       }
    </style>
</head>
<body>
    <div class="box">
        <div>
            <img src="Без названия.jpg" alt="foto" width="150px">
        </div>
        <div>
            <div style="display: block;">Oliver</div> 
            <div>
                <img class="profil" src="images.jpg">
                <span>2 mutual friends</span>
            </div> 
            <div>
                <button>Add Firend</button>
            </div>
        </div>
    </div>

    
    <div class="box-2">
        <div>
            <img src="kitten-510651.avif" alt="foto" width="150px">
        </div>
        <div>
            <div style="display: block;">Oliver</div> 
            <div>
                <img class="profil" src="images.jpg" width="150px">
                <span>3 mutual friends</span>
            </div> 
            <div>
                <button>Add Firend</button>
            </div>
        </div>
    </div>

    <div class="box-3">
        <div>
            <img src="Portrait-of-a-cat-with-whiskers-visible.webp" alt="foto" width="150px">
        </div>
        <div>
            <div style="display: block;">Oliver</div> 
            <div>
                <img class="profil" src="images.jpg" width="150px">
                <span>4 mutual friends</span>
            </div> 
            <div>
                <button>Add Firend</button>
            </div>
        </div>
    </div>
</body>
</html>
